apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "suresend.fullname" . }}
  labels:
    {{- include "suresend.labels" . | nindent 4 }}
data:
  # API
  NODE_ENV: {{ .Values.api.env.nodeEnv | quote }}
  PORT: {{ .Values.api.env.port | quote }}
  CORS_ORIGIN: {{ .Values.api.env.corsOrigin | quote }}
  # Web — server-side URL used by the Next.js proxy to reach the API
  API_INTERNAL_URL: {{ .Values.web.env.apiInternalUrl | default (printf "http://%s-api:%s" (include "suresend.fullname" .) (.Values.api.env.port)) | quote }}
