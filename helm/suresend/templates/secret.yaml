apiVersion: v1
kind: Secret
metadata:
  name: {{ include "suresend.fullname" . }}
  labels:
    {{- include "suresend.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.api.secrets.jwtSecret | quote }}
  {{- if .Values.postgresql.enabled }}
  DATABASE_URL: {{ printf "postgresql://%s:%s@%s-postgresql:5432/%s" .Values.postgresql.auth.username .Values.postgresql.auth.password .Release.Name .Values.postgresql.auth.database | quote }}
  {{- else }}
  DATABASE_URL: {{ required "api.secrets.databaseUrl is required when postgresql.enabled is false" .Values.api.secrets.databaseUrl | quote }}
  {{- end }}
  REDIS_URL: {{ .Values.api.secrets.redisUrl | quote }}
  STRIPE_SECRET_KEY: {{ .Values.api.secrets.stripeSecretKey | quote }}
  {{- if .Values.api.secrets.seedAdminEmail }}
  SEED_ADMIN_EMAIL: {{ .Values.api.secrets.seedAdminEmail | quote }}
  SEED_ADMIN_PASSWORD: {{ .Values.api.secrets.seedAdminPassword | quote }}
  {{- end }}
