{{- if .Values.unbound.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "suresend.fullname" . }}-unbound
  labels:
    {{- include "suresend.labels" . | nindent 4 }}
    app.kubernetes.io/component: unbound
data:
  unbound.conf: |
    server:
        verbosity: 3
        use-syslog: no
        logfile: ""

        interface: 0.0.0.0
        port: 5353

        do-ip4: yes
        do-ip6: no
        do-udp: yes
        do-tcp: yes

        # Allow queries from any pod in the cluster
        access-control: 0.0.0.0/0 refuse
        access-control: 127.0.0.0/8 allow
        access-control: 10.0.0.0/8 allow
        access-control: 172.16.0.0/12 allow
        access-control: 192.168.0.0/16 allow

        hide-identity: yes
        hide-version: yes
        harden-glue: yes
        harden-dnssec-stripped: yes
        harden-below-nxdomain: yes
        use-caps-for-id: yes
        val-clean-additional: yes

        cache-max-ttl: 86400
        cache-min-ttl: 300
        prefetch: yes
        rrset-roundrobin: yes
        minimal-responses: yes
{{- end }}
