## Global
nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

## API (NestJS backend)
api:
  image:
    repository: ghcr.io/frobobbo/sps-suresend/api
    tag: "latest"  # defaults to .Chart.AppVersion
    pullPolicy: IfNotPresent

  replicaCount: 1

  service:
    type: ClusterIP
    port: 4000

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  env:
    nodeEnv: production
    port: "4000"
    # Set to the public URL of the web frontend, used for CORS
    corsOrigin: "https://suresend.example.com"

  # Sensitive values — set via --set or a values override file, never commit real values.
  # databaseUrl is ignored when postgresql.enabled is true (auto-constructed from subchart).
  secrets:
    jwtSecret: "replace-me"
    databaseUrl: ""
    redisUrl: "redis://redis:6379"
    stripeSecretKey: "sk_test_replace"
    # Optional: seed a default admin user on first startup.
    # Leave both empty to skip seeding.
    seedAdminEmail: ""
    seedAdminPassword: ""

  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

## Web (Next.js frontend)
web:
  image:
    repository: ghcr.io/frobobbo/sps-suresend/web
    tag: "latest"
    pullPolicy: IfNotPresent

  replicaCount: 1

  service:
    type: ClusterIP
    port: 3000

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  env:
    # Internal URL the Next.js server uses to proxy /api/* requests to the API.
    # Leave empty to auto-construct from the API service name (recommended).
    # Override only when the API is hosted outside the same cluster.
    apiInternalUrl: ""

  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

## Ingress
ingress:
  enabled: true
  className: nginx
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    # nginx.ingress.kubernetes.io/proxy-body-size: "10m"

  web:
    host: suresend.example.com
    tls: []
    # - secretName: suresend-web-tls
    #   hosts:
    #     - suresend.example.com

  api:
    host: api.suresend.example.com
    tls: []
    # - secretName: suresend-api-tls
    #   hosts:
    #     - api.suresend.example.com

## Unbound recursive DNS resolver
# Used by the API's reputation service for accurate RBL blacklist checks.
# When enabled, a per-instance dns.Resolver in the reputation service is
# configured to route all DNS lookups through unbound instead of the
# cluster's public-forwarding resolver (CoreDNS → 8.8.8.8).
unbound:
  enabled: true
  image:
    repository: mvance/unbound
    tag: "1.21.1"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi

## PostgreSQL (Bitnami subchart)
# Set enabled: false to use an external database and provide api.secrets.databaseUrl instead.
postgresql:
  enabled: true
  auth:
    username: suresend
    # Set a strong password — never leave this as the default in production
    password: "suresend-change-me"
    database: suresend
  primary:
    persistence:
      enabled: true
      size: 8Gi
