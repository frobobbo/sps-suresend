name: Release Helm Chart

on:
  push:
    branches:
      - main
    paths:
      - 'helm/**'
      - '.github/workflows/helm-release.yml'
  workflow_dispatch:

jobs:
  release:
    name: Package and Push Chart to GHCR (OCI)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Resolve chart dependencies
        run: helm dependency update helm/suresend

      - name: Package chart
        run: helm package helm/suresend --destination /tmp/charts

      - name: Push chart to GHCR
        run: helm push /tmp/charts/suresend-*.tgz oci://ghcr.io/${{ github.repository_owner }}
