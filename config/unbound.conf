server:
    verbosity: 1

    interface: 0.0.0.0
    port: 53

    do-ip4: yes
    do-ip6: no
    do-udp: yes
    do-tcp: yes

    # Allow queries from localhost and all private/RFC-1918 + Docker networks.
    # 172.16.0.0/12 covers Docker's default bridge and any custom subnets.
    access-control: 0.0.0.0/0 refuse
    access-control: 127.0.0.0/8 allow
    access-control: 10.0.0.0/8 allow
    access-control: 172.16.0.0/12 allow
    access-control: 192.168.0.0/16 allow

    hide-identity: yes
    hide-version: yes
    harden-glue: yes
    harden-dnssec-stripped: yes
    harden-below-nxdomain: yes
    use-caps-for-id: yes
    val-clean-additional: yes

    # Cache tuning
    cache-max-ttl: 86400
    cache-min-ttl: 300
    prefetch: yes
    rrset-roundrobin: yes
    minimal-responses: yes
