services:
  unbound:
    image: mvance/unbound:1.21.1
    container_name: suresend-unbound
    volumes:
      - ./config/unbound.conf:/opt/unbound/etc/unbound/unbound.conf:ro
    networks:
      suresend:
        ipv4_address: 172.28.0.53
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: suresend-web
    environment:
      # Server-side URL used by the Next.js proxy to reach the API container.
      # The browser never calls the API directly — all /api/* requests go
      # through the Next.js server which forwards them here.
      API_INTERNAL_URL: http://api:4000
    ports:
      - '3000:3000'
    depends_on:
      - api
    networks:
      - suresend

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: suresend-api
    # Route all external DNS queries through the local unbound recursive resolver.
    # Docker's embedded DNS (127.0.0.11) still handles container name resolution
    # (db, redis, etc.) and forwards external queries to unbound.
    dns:
      - 172.28.0.53
    environment:
      NODE_ENV: production
      PORT: 4000
      CORS_ORIGIN: http://localhost:3000
      JWT_SECRET: replace-me
      DATABASE_URL: postgresql://postgres:postgres@db:5432/suresend
      REDIS_URL: redis://redis:6379
      STRIPE_SECRET_KEY: sk_test_replace
      # Optional: seed a default admin user on first startup
      SEED_ADMIN_EMAIL: admin@example.com
      SEED_ADMIN_PASSWORD: change-me-please
      # Reputation service will use this resolver for all DNS checks.
      # Matches the fixed IP assigned to the unbound container above.
      DNS_RESOLVER_IP: 172.28.0.53
    ports:
      - '4000:4000'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      unbound:
        condition: service_started
    networks:
      - suresend

  db:
    image: postgres:16-alpine
    container_name: suresend-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: suresend
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d suresend']
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    networks:
      - suresend

  redis:
    image: redis:7-alpine
    container_name: suresend-redis
    ports:
      - '6379:6379'
    networks:
      - suresend

networks:
  suresend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24

volumes:
  postgres_data:
